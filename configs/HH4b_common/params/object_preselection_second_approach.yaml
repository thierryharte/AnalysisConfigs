object_preselection:
  ## Jet selection
  Jet:
    pt: 30
    eta: 2.5
    jetId: 6 # 6 with lepveto or 2 w/o lepveto
    #TODO: trigger matching?
  
  ## Lepton selection
  Electron:
    pt: 15
    eta: 2.5
    id: 
      type: mvaIso_WP90
      working_point: 1 # cut-based ID RunIII Winter22 (0:fail, 1:veto, 2:loose, 3:medium, 4:tight)
    iso: 0.15 # 0.3? #DeltaR=0.3
    eta_threshold: 0.1479
    dz_lowEta: 0.1
    dz_highEta: 0.2
    dxy_lowEta: 0.05
    dxy_highEta: 0.1

  Muon:
    pt: 10
    eta: 2.4
    id: looseId
    iso: # 0.15 # 0.3? #DeltaR=0.3
      type: pfRelIso04_all # PFIso ID from miniAOD selector (1=PFIsoVeryLoose, 2=PFIsoLoose, 3=PFIsoMedium, 4=PFIsoTight, 5=PFIsoVeryTight, 6=PFIsoVeryVeryTight)
      max_value: 0.15
      # working_point: 2
    eta_threshold: 0.1479
    dz_lowEta: 0.1
    dz_highEta: 0.2
    dxy_lowEta: 0.05
    dxy_highEta: 0.1

  ## VBF jet selection
  JetVBF:
    pt: 30
    eta: 4.7
    jetId: 6 # 6 with lepveto or 2 w/o lepveto
